<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link
    rel="stylesheet"
    href="travel_recommendation.css">

</head>

<body>

    <!-- NAVIGATION -->

    <nav>

        <h1>Travel Recommendation</h1>

        <div class="nav-links">

            <a href="travel_recommendation.html">
                Home
            </a>

            <a href="about.html">
                About Us
            </a>

            <a href="contact.html">
                Contact Us
            </a>

        </div>

    </nav>

    <!-- CONTACT SECTION -->

    <section class="contact-section">

        <h1>Contact Us</h1>

        <p>
            Have questions or travel suggestions?
            Send us a message.
        </p>

        <form class="contact-form">

            <input
            type="text"
            placeholder="Your Name"
            required>

            <input
            type="email"
            placeholder="Your Email"
            required>

            <textarea
            rows="6"
            placeholder="Your Message"
            required>
            </textarea>

            <button type="submit">
                Submit
            </button>

        </form>

    </section>

</body>

</html>
